<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Jildan</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a, #7c3aed);
    color: white;
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    width: 100%;
    height: 70px;
    padding: 0 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    z-index: 1000;
}

.logo {
    font-size: 1.3rem;
    font-weight: bold;
    letter-spacing: 1px;
}

.menu-toggle {
    background: none;
    border: none;
    color: white;
    font-size: 2rem;
    cursor: pointer;
}

.dropdown {
    position: absolute;
    top: 75px;
    right: 20px;
    width: 250px;
    display: none;
    flex-direction: column;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

.dropdown.show {
    display: flex;
}

.dropdown a {
    color: white;
    text-decoration: none;
    padding: 15px 20px;
    transition: 0.3s;
}

.dropdown a:hover {
    background: rgba(255,255,255,0.1);
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 1100px;
    margin: 40px auto;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* HERO */
.hero {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 50px;
}

/* PHOTO */
.photo {
    width: 250px;
    height: 250px;
    border-radius: 50%; 
    overflow: hidden;
    border: 6px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    flex-shrink: 0;
}

.photo img {
    width: 100%;
    height: 100%; 
    object-fit: cover;
}

/* INFO */
.info {
    flex: 1;
    min-width: 280px;
}

.info h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

.typing {
    font-size: 1.3rem;
    color: #cbd5e1;
    margin-bottom: 20px;
    min-height: 35px;
}

.info p {
    line-height: 1.8;
    color: #f1f5f9;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .hero {
        text-align: center;
        padding: 35px 25px;
    }

    .info h1 {
        font-size: 2.4rem;
    }

    .photo {
        width: 220px;
        height: 220px;
    }

    .dropdown {
        width: 220px;
        right: 10px;
    }
}
</style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">Jildan DEV</div>

    <button class="menu-toggle" onclick="toggleMenu()">
        &#9776;
    </button>

    <nav class="dropdown" id="dropdownMenu">
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="skill.html">Skill</a>
        <a href="target.html">Target & Impian</a>
        <a href="motto.html">Motto Hidup</a>
    </nav>
</header>

<!-- MAIN CONTENT -->
<div class="container">
    <div class="card">
        <section class="hero">
            <div class="photo">
                <img src="images/foto-profil.png" alt="Foto Profil">
            </div>

            <div class="info">
                <h1>Jildan</h1>
                <div class="typing" id="typing"></div>

                <p>
                    Halo! Saya adalah seorang pelajar yang suka belajar teknologi,
                    desain, dan membuat proyek kreatif.
                </p>
            </div>
        </section>
    </div>
</div>

<script>
/* MENU TOGGLE */
function toggleMenu() {
    document.getElementById('dropdownMenu').classList.toggle('show');
}

/* TUTUP MENU SAAT KLIK DI LUAR */
window.addEventListener('click', function(e) {
    const menu = document.getElementById('dropdownMenu');
    const button = document.querySelector('.menu-toggle');

    if (!menu.contains(e.target) && !button.contains(e.target)) {
        menu.classList.remove('show');
    }
});

/* TYPING EFFECT */
const texts = [
    'Pelajar Kreatif',
    'Web Developer',
    'UI Designer',
    'Future Programmer'
];

let index = 0;
let charIndex = 0;
let isDeleting = false;
const typing = document.getElementById('typing');

function typeEffect() {
    const current = texts[index];

    if (isDeleting) {
        charIndex--;
    } else {
        charIndex++;
    }

    typing.textContent = current.substring(0, charIndex);

    let speed = isDeleting ? 60 : 100;

    if (!isDeleting && charIndex === current.length) {
        speed = 1500;
        isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
        isDeleting = false;
        index = (index + 1) % texts.length;
        speed = 300;
    }

    setTimeout(typeEffect, speed);
}

typeEffect(); 
</script>

</body>
</html>
