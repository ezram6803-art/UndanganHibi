<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata</title>
<style>
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);color:white;padding:0;}
.navbar { position: sticky; top: 0; width: 100%; height: 70px; padding: 0 25px; display: flex; align-items: center; justify-content: space-between; background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); }
.logo { font-size: 1.3rem; font-weight: bold; }
.menu-toggle { background:none; border:none; color:white; font-size:2rem; cursor:pointer; }
.dropdown { position:absolute; top:75px; right:20px; width:250px; display:none; flex-direction:column; background:rgba(255,255,255,.08); border-radius:20px; overflow:hidden; }
.dropdown.show { display:flex; }
.dropdown a { color:white; text-decoration:none; padding:15px 20px; }
.dropdown a:hover { background:rgba(255,255,255,.1); }
.card{max-width:900px;margin:30px auto;background:rgba(255,255,255,.08);padding:40px;border-radius:30px;}
.item{background:rgba(255,255,255,.08);padding:20px;border-radius:20px;margin-bottom:15px;}
</style>
</head>
<body>
<header class="navbar">
    <div class="logo">Jildan DEV</div>
    <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>
    <nav class="dropdown" id="dropdownMenu">
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="skill.html">Skill</a>
        <a href="target.html">Target & Impian</a>
        <a href="motto.html">Motto Hidup</a>
    </nav>
</header>
<div class="card">
    <h1>Biodata</h1>
    <div class="item"><strong>Nama Lengkap:</strong> Moch Jildan Apriliand</div>
    <div class="item"><strong>Kelas:</strong> VIII D</div>
    <div class="item"><strong>Sekolah:</strong> SMP PGRI 1 CIDAHU</div>
    <div class="item"><strong>Alamat:</strong> Sukabumi, Jawa Barat</div>
    <div class="item"><strong>Hobi:</strong> Coding, Gaming, Desain</div>
    <div class="item"><strong>Cita-cita:</strong> Web Developer & Pengusaha</div>
</div>
<script>
function toggleMenu(){document.getElementById('dropdownMenu').classList.toggle('show');}
window.addEventListener('click', function(e){const menu=document.getElementById('dropdownMenu'); const button=document.querySelector('.menu-toggle'); if(!menu.contains(e.target) && !button.contains(e.target)){menu.classList.remove('show');}});
</script>
</body>
</html>
