<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Jildan</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#7c3aed);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}
.card{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    padding:50px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}
.photo{
    width:220px;
    height:220px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:6px solid rgba(255,255,255,0.3);
}
.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}
h1{
    font-size:3rem;
    margin:20px 0 10px;
}
.typing{
    font-size:1.3rem;
    color:#cbd5e1;
    min-height:35px;
    margin-bottom:20px;
}
p{
    color:#f1f5f9;
    line-height:1.8;
    margin-bottom:30px;
}
.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}
.menu a{
    text-decoration:none;
    color:white;
    padding:12px 24px;
    border-radius:999px;
    background:linear-gradient(90deg,#06b6d4,#8b5cf6);
    font-weight:bold;
    transition:.3s;
}
.menu a:hover{
    transform:scale(1.05);
}
</style>
</head>
<body>

<div class="card">
    <div class="photo">
        <img src="https://i.ibb.co.com/tw4KfFLF/Proyek-Baru-2-46929-CF.png" alt="Foto Profil">
    </div>

    <h1>Jildan</h1>
    <div class="typing" id="typing"></div>

    <p>
        Halo! Saya adalah seorang pelajar yang suka belajar teknologi,
        desain, dan membuat proyek kreatif.
    </p>

    <div class="menu">
        <a href="biodata.html">Biodata</a>
        <a href="skill.html">Skill</a>
        <a href="target.html">Target & Impian</a>
        <a href="motto.html">Motto Hidup</a>
    </div>
</div>

<script>
const texts = [
    "Pelajar Kreatif",
    "Web Developer",
    "UI Designer",
    "Future Programmer"
];

let index = 0;
let charIndex = 0;
let isDeleting = false;
const typing = document.getElementById("typing");

function typeEffect() {
    const current = texts[index];

    if (isDeleting) charIndex--;
    else charIndex++;

    typing.textContent = current.substring(0, charIndex);

    let speed = isDeleting ? 60 : 100;

    if (!isDeleting && charIndex === current.length) {
        speed = 1500;
        isDeleting = true;
    } else if (isDeleting && charIndex === 0) {
        isDeleting = false;
        index = (index + 1) % texts.length;
        speed = 300;
    }

    setTimeout(typeEffect, speed);
}

typeEffect();
</script>

</body>
</html>
